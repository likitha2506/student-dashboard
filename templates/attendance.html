{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Attendance Tracking</h2>
    <a class="btn btn-outline-primary" href="{{ url_for('attendance_summary') }}">View Summary</a>
</div>
<form method="post" class="card shadow-sm p-3">
    <div class="mb-3">
        <label class="form-label">Date</label>
        <input class="form-control" type="date" name="date" value="{{ today }}" required>
    </div>
    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Name</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.student_id }}</td>
                    <td>{{ student.name }}</td>
                    <td>
                        <select name="status_{{ student.id }}" class="form-select" required>
                            <option value="Present">Present</option>
                            <option value="Absent">Absent</option>
                        </select>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <button class="btn btn-success" type="submit">Save Attendance</button>
</form>
{% endblock %}
