{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="mb-3 text-center">Login</h3>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Login As</label>
                        {% if locked_role %}
                        <input type="text" class="form-control" value="{{ selected_role|title }}" readonly>
                        <input type="hidden" name="role" value="{{ selected_role }}">
                        {% else %}
                        <select name="role" class="form-select" required>
                            <option value="admin" {{ 'selected' if selected_role == 'admin' else '' }}>Admin</option>
                            <option value="student" {{ 'selected' if selected_role == 'student' else '' }}>Student</option>
                        </select>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="mt-3 mb-0 text-center">No account? <a href="{{ url_for('register') }}">Register here</a></p>
                <p class="mt-2 mb-0 text-center small">
                    Quick links:
                    <a href="{{ url_for('admin_login') }}">Admin Login</a> |
                    <a href="{{ url_for('student_login') }}">Student Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
